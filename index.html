<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATMTA - Interactive Tracing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital@1&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#2f3f4f',
                            teal: '#006680',
                            tealhover: '#005266'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            /* Grid Background */
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(100, 116, 139, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(100, 116, 139, 0.05) 1px, transparent 1px);
            min-height: 100vh;
            color: #0f172a;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Moving Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            background:
                radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(13, 148, 136, 0.03), transparent 25%);
            animation: moveGradient 15s ease-in-out infinite alternate;
        }

        @keyframes moveGradient {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 100% 100%;
            }
        }

        /* Decorative Background Lines & Nodes */
        .bg-nodes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            pointer-events: none;
        }

        .bg-nodes svg {
            width: 100%;
            height: 100%;
            opacity: 0.4;
        }

        /* Animations */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mockup Window */
        .mockup-window {
            background: white;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
        }

        .mockup-header {
            background: #eef2f6;
            height: 38px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #e2e8f0;
            position: relative;
        }

        .mockup-dots {
            display: flex;
            gap: 6px;
        }

        .mockup-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red {
            background: #ff5f56;
        }

        .dot-yellow {
            background: #ffbd2e;
        }

        .dot-green {
            background: #27c93f;
        }

        .mockup-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #94a3b8;
            text-transform: uppercase;
        }
    </style>
</head>

<body class="antialiased selection:bg-brand-teal selection:text-white">

    <div class="gradient-bg"></div>

    <div class="bg-nodes">
        <svg preserveAspectRatio="xMidYMid slice">
            <!-- Background Decorative Elements matching the image -->
            <path d="M 250 250 L 750 150 L 850 550" fill="none" stroke="#cbd5e1" stroke-width="1"
                stroke-dasharray="4 4" />
            <circle cx="250" cy="250" r="40" fill="none" stroke="#94a3b8" stroke-width="1" />
            <circle cx="750" cy="150" r="50" fill="none" stroke="#94a3b8" stroke-width="1" />
        </svg>
    </div>

    <main class="relative z-10 flex-1 flex flex-col items-center pt-24 px-6 pb-12 w-full max-w-5xl mx-auto">

        <!-- Subtle Top Text -->
        <p class="font-serif italic text-slate-400 text-lg md:text-xl mb-4 fade-in-up">
            Logic and syntax, in perfect rhythm.
        </p>

        <!-- Main Huge Logo Text -->
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter text-brand-dark mb-6 fade-in-up delay-1">
            ATMTA
        </h1>

        <!-- Sub Description -->
        <p class="text-slate-500 text-base md:text-lg max-w-2xl text-center leading-relaxed mb-10 fade-in-up delay-2">
            An interactive workspace for <strong class="text-brand-teal">Automata & Formal Languages</strong>. Design,
            simulate, and debug Deterministic Finite Automata, Context-Free Grammars, and Pushdown Automata in a
            professional, real-time environment.
        </p>

        <!-- Action Buttons -->
        <div class="flex items-center gap-6 mb-20 fade-in-up delay-3">
            <a href="DFA_Tester.html"
                class="inline-flex items-center gap-2 px-6 py-3 rounded-md bg-brand-teal hover:bg-brand-tealhover text-white font-bold text-sm transition-colors shadow-md">
                Enter Dashboard
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
            <a href="#" class="text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors">
                View Demo
            </a>
        </div>

        <!-- App Mockup Window -->
        <div class="w-full fade-in-up delay-4">
            <div class="mockup-window">
                <div class="mockup-header">
                    <div class="mockup-dots">
                        <div class="mockup-dot dot-red"></div>
                        <div class="mockup-dot dot-yellow"></div>
                        <div class="mockup-dot dot-green"></div>
                    </div>
                    <div class="mockup-title">Simulator v1.0.4</div>
                </div>
                <div class="flex h-80 bg-slate-50">
                    <!-- Sidebar Mockup -->
                    <div class="w-1/3 max-w-[240px] bg-white border-r border-slate-100 p-6 flex flex-col gap-4">
                        <div class="h-4 bg-indigo-100 rounded-sm w-3/4"></div>
                        <div class="h-4 bg-indigo-100 rounded-sm w-1/2"></div>
                        <div class="h-4 bg-indigo-100 rounded-sm w-2/3 mb-4"></div>
                        <div class="h-10 border border-slate-200 bg-slate-50 rounded-sm w-full"></div>
                    </div>
                    <!-- Main Area Mockup -->
                    <div class="flex-1 bg-slate-100 relative flex items-center justify-center">
                        <svg width="240" height="100" viewBox="0 0 240 100" class="overflow-visible">
                            <!-- Arrow line -->
                            <path d="M 60 50 L 152 50" fill="none" stroke="#3b82f6" stroke-width="3"
                                marker-end="url(#mockup-arrow)" />
                            <text x="106" y="42" fill="#3b82f6" font-size="11" text-anchor="middle"
                                font-family="monospace" font-weight="bold">1</text>

                            <!-- q0 Node (Active Start State) -->
                            <circle cx="40" cy="50" r="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="3" />
                            <text x="40" y="47" fill="#0f172a" font-size="15" font-weight="bold" text-anchor="middle"
                                font-family="sans-serif">−</text>
                            <text x="40" y="59" fill="#0f172a" font-size="10" font-weight="bold" text-anchor="middle"
                                font-family="monospace">S0</text>

                            <!-- q1 Node (Inactive) -->
                            <circle cx="180" cy="50" r="20" fill="#ffffff" stroke="#64748b" stroke-width="2" />
                            <text x="180" y="54" fill="#0f172a" font-size="10" font-weight="bold" text-anchor="middle"
                                font-family="monospace">S1</text>

                            <defs>
                                <marker id="mockup-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6"
                                    markerHeight="6" orient="auto">
                                    <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
                                </marker>
                            </defs>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
